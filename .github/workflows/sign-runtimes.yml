name: Sign and release runtimes

on:
  workflow_dispatch:
    inputs:
      runtimes:
        description: 'Comma-separated list of name=url pairs to sign (e.g. jre8-zero=https://...,jre8-halfjit=https://...)'
        required: true
        type: string

jobs:
  sign:
    name: Sign runtimes
    runs-on: macos-latest
    steps:
      - name: Install ldid
        run: brew install ldid

      - name: Download, sign, and repackage runtimes
        run: |
          mkdir -p output
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.runtimes }}"
          for pair in "${PAIRS[@]}"; do
            name="${pair%%=*}"
            url="${pair#*=}"
            echo "Processing $name from $url"

            mkdir -p "work/$name"
            curl -L -o "work/$name.tar.xz" "$url"

            cd "work/$name"
            tar xf "../$name.tar.xz"
            cd ../..

            # Find the actual extracted folder (usually java-X-openjdk*)
            extracted_dir=$(find "work/$name" -maxdepth 1 -type d -name "java-*" | head -n1)
            if [ -z "$extracted_dir" ]; then
              extracted_dir="work/$name"
            fi

            echo "Signing binaries in $extracted_dir"
            find "$extracted_dir" -type f \( -name "*.dylib" -o -name "java" -o -name "javac" -o -perm +111 \) -print0 | while IFS= read -r -d '' file; do
              if file "$file" | grep -q "Mach-O"; then
                echo "Signing: $file"
                ldid -S "$file" || echo "Failed to sign $file, continuing"
              fi
            done

            echo "Repackaging $name"
            cd "$extracted_dir/.."
            base_name=$(basename "$extracted_dir")
            tar -cJf "../../../output/$name-signed.tar.xz" "$base_name"
            cd - > /dev/null
          done

      - name: List output
        run: ls -la output/

      - name: Upload signed runtimes
        uses: actions/upload-artifact@main
        with:
          name: signed-runtimes
          path: output/*.tar.xz
