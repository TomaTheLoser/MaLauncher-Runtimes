name: Sign and release runtimes

on:
  workflow_dispatch:
    inputs:
      runtimes:
        description: 'Comma-separated list of name=url pairs to sign (e.g. jre8-zero=https://...,jre8-halfjit=https://...)'
        required: true
        type: string

jobs:
  sign:
    name: Sign runtimes
    runs-on: macos-latest
    steps:
      - name: Install ldid
        run: brew install ldid

      - name: Download, sign, and repackage runtimes
        run: |
          mkdir -p output work
          
          # Parse the input correctly
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.runtimes }}"
          
          for pair in "${PAIRS[@]}"; do
            # Remove leading/trailing whitespace
            pair="${pair#"${pair%%[![:space:]]*}"}"
            pair="${pair%"${pair##*[![:space:]]}"}"
            
            # Split by = carefully
            name=$(echo "$pair" | cut -d'=' -f1 | xargs)
            url=$(echo "$pair" | cut -d'=' -f2- | xargs)
            
            echo "Processing: name=$name"
            echo "URL: $url"
            
            filename=$(basename "$url")
            archive_path="work/$filename"
            
            echo "Downloading to: $archive_path"
            curl -L -o "$archive_path" "$url"
            
            echo "Archive size: $(du -h $archive_path)"
            
            # Extract to work directory
            echo "Extracting full archive..."
            mkdir -p "work/extract_$name"
            tar -xJf "$archive_path" -C "work/extract_$name"
            
            # Find the JRE/JDK root (could be java-*, jre, etc)
            jre_root=$(find "work/extract_$name" -maxdepth 2 -type d \( -name "java-*" -o -name "jre*" -o -name "jdk*" \) | head -n1)
            
            if [ -z "$jre_root" ]; then
              jre_root=$(ls -d work/extract_$name/*/ | head -n1)
            fi
            
            if [ -z "$jre_root" ]; then
              jre_root="work/extract_$name"
            fi
            
            echo "JRE root: $jre_root"
            echo "JRE root size: $(du -sh $jre_root)"
            
            # Sign ALL executable files and libraries
            echo "Signing all binaries and libraries..."
            find "$jre_root" -type f \( -executable -o -name "*.dylib" -o -name "*.so" \) | while read file; do
              if file "$file" | grep -q "Mach-O"; then
                echo "Signing: $file"
                ldid -S "$file" 2>/dev/null || true
              fi
            done
            
            echo "Repackaging as $name-signed.tar.xz..."
            base_name=$(basename "$jre_root")
            tar -cJf "output/$name-signed.tar.xz" -C "$(dirname $jre_root)" "$base_name"
            
            echo "Output size: $(du -h output/$name-signed.tar.xz)"
            
            # Cleanup
            rm -rf "work/extract_$name"
          done

      - name: List output
        run: ls -la output/

      - name: Upload signed runtimes
        uses: actions/upload-artifact@main
        with:
          name: signed-runtimes
          path: output/*.tar.xz
