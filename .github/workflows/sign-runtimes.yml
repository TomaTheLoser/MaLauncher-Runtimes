name: Sign and release runtimes

on:
  workflow_dispatch:
    inputs:
      runtimes:
        description: 'Comma-separated list of name=url pairs to sign (e.g. jre8-zero=https://...,jre8-halfjit=https://...)'
        required: true
        type: string

jobs:
  sign:
    name: Sign runtimes
    runs-on: macos-latest
    steps:
      - name: Install ldid
        run: brew install ldid

      - name: Download, sign, and repackage runtimes
        run: |
          set -x  # Debug mode
          mkdir -p output work
          
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.runtimes }}"
          
          for pair in "${PAIRS[@]}"; do
            pair="${pair#"${pair%%[![:space:]]*}"}"
            pair="${pair%"${pair##*[![:space:]]}"}"
            
            name=$(echo "$pair" | cut -d'=' -f1 | xargs)
            url=$(echo "$pair" | cut -d'=' -f2- | xargs)
            
            echo "=== Processing: $name ==="
            
            filename=$(basename "$url")
            
            # Download
            echo "Downloading..."
            curl -L -o "work/$filename" "$url"
            ls -lh "work/$filename"
            
            # Extract
            echo "Extracting..."
            mkdir "work/$name"
            tar -xJf "work/$filename" -C "work/$name"
            
            echo "Extracted contents:"
            ls -lah "work/$name/"
            du -sh "work/$name/"
            
            # Sign everything recursively
            echo "Signing all Mach-O files..."
            find "work/$name" -type f -exec file {} \; | grep "Mach-O" | cut -d: -f1 | while read file; do
              echo "Signing: $file"
              ldid -S "$file" || echo "Failed: $file"
            done
            
            # Verify files exist
            echo "Files after signing:"
            find "work/$name" -type f | wc -l
            du -sh "work/$name/"
            
            # Repackage
            echo "Repackaging..."
            tar -cJf "output/$name-signed.tar.xz" -C "work" "$name"
            
            echo "Final output:"
            ls -lh "output/$name-signed.tar.xz"
          done

      - name: List output
        run: ls -la output/

      - name: Upload signed runtimes
        uses: actions/upload-artifact@main
        with:
          name: signed-runtimes
          path: output/*.tar.xz
