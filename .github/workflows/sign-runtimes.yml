name: Sign and release runtimes

on:
  workflow_dispatch:
    inputs:
      runtimes:
        description: 'Comma-separated list of name=url pairs to sign (e.g. jre8-zero=https://...,jre8-halfjit=https://...)'
        required: true
        type: string

jobs:
  sign:
    name: Sign runtimes
    runs-on: macos-latest
    steps:
      - name: Install ldid
        run: brew install ldid

      - name: Download, sign, and repackage runtimes
        run: |
          mkdir -p output
          
          # Parse the input correctly
          IFS=',' read -ra PAIRS <<< "${{ github.event.inputs.runtimes }}"
          
          for pair in "${PAIRS[@]}"; do
            # Remove leading/trailing whitespace
            pair="${pair#"${pair%%[![:space:]]*}"}"
            pair="${pair%"${pair##*[![:space:]]}"}"
            
            # Split by = carefully
            name=$(echo "$pair" | cut -d'=' -f1 | xargs)
            url=$(echo "$pair" | cut -d'=' -f2- | xargs)
            
            echo "Processing: name=$name url=$url"
            
            filename=$(basename "$url")
            echo "Downloading to: work/$filename"
            
            mkdir -p work
            curl -L -o "work/$filename" "$url"
            
            echo "Extracting..."
            cd work
            tar -xf "$filename"
            cd ..
            
            # Find the extracted folder
            extracted_dir=$(find "work" -maxdepth 1 -type d -name "java-*" | head -n1)
            if [ -z "$extracted_dir" ]; then
              extracted_dir=$(find "work" -maxdepth 1 -type d ! -name "work" | head -n1)
            fi
            
            if [ -z "$extracted_dir" ]; then
              echo "Error: Could not find extracted directory"
              exit 1
            fi
            
            echo "Found extracted dir: $extracted_dir"
            echo "Signing binaries..."
            
            find "$extracted_dir" -type f \( -name "*.dylib" -o -name "java" -o -name "javac" \) -exec file {} \; | grep "Mach-O" | cut -d: -f1 | while read file; do
              echo "Signing: $file"
              ldid -S "$file" || echo "Warning: Failed to sign $file"
            done
            
            echo "Repackaging as $name-signed.tar.xz"
            base_name=$(basename "$extracted_dir")
            tar -cJf "output/$name-signed.tar.xz" -C "work" "$base_name"
            
            rm -rf work
          done

      - name: List output
        run: ls -la output/

      - name: Upload signed runtimes
        uses: actions/upload-artifact@main
        with:
          name: signed-runtimes
          path: output/*.tar.xz
